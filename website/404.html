<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0A2540" />
  <meta name="robots" content="noindex" />
  <title>Page not found — Castor</title>
  <link rel="icon" type="image/jpeg" href="/assets/castor-logo.jpg" />
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .nf-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;background:var(--navy,#0a2540);color:#fff;}
    .nf-wrap img{width:96px;height:96px;border-radius:18px;margin-bottom:24px;box-shadow:0 12px 40px rgba(0,0,0,.35);}
    .nf-code{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:.9rem;letter-spacing:.18em;text-transform:uppercase;color:#7fd3ff;margin:0 0 10px;}
    .nf-wrap h1{font-size:clamp(1.6rem,4vw,2.4rem);margin:0 0 12px;font-weight:800;}
    .nf-wrap p{max-width:46ch;color:#c6d2e0;line-height:1.6;margin:0 0 28px;}
    .nf-btn{display:inline-flex;align-items:center;gap:8px;background:#2496ed;color:#fff;text-decoration:none;font-weight:600;padding:12px 22px;border-radius:10px;transition:background .15s ease;}
    .nf-btn:hover{background:#1a7fd0;}
  </style>
</head>
<body>
  <main class="nf-wrap">
    <img src="/assets/castor-logo.jpg" width="96" height="96" alt="Castor beaver logo" />
    <p class="nf-code">Error 404</p>
    <h1>This page wandered off.</h1>
    <p>The page you're looking for doesn't exist (or moved). Let's get you back to managing containers.</p>
    <a class="nf-btn" href="/">← Back to Castor</a>
  </main>
</body>
</html>
