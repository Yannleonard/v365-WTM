# =============================================================================
# Castor marketing site — Nginx server config
# Serves the static landing page on :8080 (non-root / Azure-friendly).
#
# This file is included from the stock nginx.conf's `http {}` block via
# /etc/nginx/conf.d/. It defines ONE server listening on 8080.
# =============================================================================

# Don't leak the Nginx version in error pages or the Server header.
server_tokens off;

# --- gzip -------------------------------------------------------------------
gzip              on;
gzip_vary         on;
gzip_comp_level   6;
gzip_min_length   1024;
gzip_proxied      any;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/manifest+json
    image/svg+xml
    font/ttf
    font/otf;

# Map: assets that should be cached for a long time (immutable build output).
# index.html is deliberately excluded so content updates go live immediately.
map $uri $castor_cache_control {
    default                                   "no-cache";
    "~*\.(?:css|js|mjs)$"                     "public, max-age=31536000, immutable";
    "~*\.(?:jpg|jpeg|png|gif|webp|svg|ico)$"  "public, max-age=31536000, immutable";
    "~*\.(?:woff2?|ttf|otf|eot)$"             "public, max-age=31536000, immutable";
}

server {
    # Azure App Service for Containers / Container Apps expect a configurable
    # port; we standardise on 8080 and document WEBSITES_PORT=8080.
    listen      8080;
    listen      [::]:8080;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Limit accepted methods for a static site.
    if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
        return 405;
    }

    # --- Security headers (applied to every response, including errors) -----
    # CSP for a static marketing page:
    #   - default to self
    #   - allow Google Fonts stylesheet (fonts.googleapis.com) + inline styles
    #     (the page uses style="" attributes and main.js sets inline widths)
    #   - allow self + inline scripts are NOT used as <script> blocks, but the
    #     inline onerror="" handler on the dashboard <img> requires 'unsafe-inline'
    #   - allow fonts from fonts.gstatic.com
    #   - allow images/data: (inline SVG data-URIs in the CSS)
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; object-src 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header X-XSS-Protection "0" always;

    # Per-request cache policy from the map above.
    add_header Cache-Control $castor_cache_control always;

    # --- Health check endpoint (cheap, no logging) --------------------------
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # --- Static file serving ------------------------------------------------
    # It's a single-page static site: try the file, then fall back to the
    # index. A genuinely unknown path renders the 404 page (see below).
    location / {
        try_files $uri $uri/ =404;
    }

    # Don't serve dotfiles (e.g. a stray .gitkeep, .claude, etc.).
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Custom 404 -> friendly page that links back home.
    error_page 404 /404.html;
    location = /404.html {
        internal;
        add_header Cache-Control "no-cache" always;
    }
}
