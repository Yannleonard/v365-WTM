# =============================================================================
# Castor CI — lint + go test + vitest + govulncheck + a real image build.
# Mandated checks: golangci-lint, `go test ./...`, UI build + tests, and
# `govulncheck ./...` (ADR-003 §7). The image-build job proves the Dockerfile
# (and the embed-path contract) stays green on every push/PR.
# =============================================================================
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: "1.25.11"
  NODE_VERSION: "24"

jobs:
  # ---------------------------------------------------------------------------
  # UI: build the React app (this also produces server/web/dist for the Go job
  # via the artifact) and run vitest.
  # ---------------------------------------------------------------------------
  ui:
    name: UI (build + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install deps
        working-directory: ui
        run: npm ci

      - name: Lint (eslint)
        working-directory: ui
        run: npm run lint --if-present

      - name: Build (vite -> ../server/web/dist)
        working-directory: ui
        run: npm run build

      - name: Verify embed output exists
        run: test -f server/web/dist/index.html

      - name: Unit tests (vitest)
        working-directory: ui
        run: npm test

      - name: Upload built UI (embed input for the Go job)
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: server/web/dist
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Go: lint, test (race), and govulncheck. Uses the UI artifact so the embed is
  # the real build, not the committed placeholder.
  # ---------------------------------------------------------------------------
  go:
    name: Go (lint + test + govulncheck)
    runs-on: ubuntu-latest
    needs: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download built UI into embed path
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: server/web/dist

      - name: go mod verify
        run: go mod verify

      - name: Build (static, CGO-free)
        env:
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          # Pin a release built with Go >= 1.25 (the module's targeted version).
          # An older golangci-lint refuses to load with "Go language version
          # (go1.24) ... lower than the targeted Go version (1.25.0)".
          version: v2.5.0
          args: --timeout=5m

      - name: Test (race)
        run: go test -race -count=1 ./...

      - name: govulncheck (gated)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # Strict gate: fails on ANY reachable vulnerability except the small,
          # explicitly-justified allow-list in scripts/govulncheck-gate (rationale
          # in SECURITY.md). Newly-disclosed vulns still break the build.
          govulncheck -format json ./... | go run ./scripts/govulncheck-gate

  # ---------------------------------------------------------------------------
  # Image: prove the multi-stage Dockerfile builds end to end (local arch).
  # This catches embed-path / stage-ordering regressions on every change.
  # ---------------------------------------------------------------------------
  image:
    name: Image (docker build)
    runs-on: ubuntu-latest
    needs: [ui, go]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: castor:ci
          build-args: |
            VERSION=ci-${{ github.sha }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the healthcheck subcommand
        run: |
          # The binary must at least recognize the `healthcheck` subcommand.
          # It exits non-zero because no server is listening here — that is the
          # expected "unhealthy" path; we only assert the subcommand runs (no
          # panic / "unknown command"). `|| true` tolerates the expected exit 1.
          docker run --rm --entrypoint /usr/local/bin/castor castor:ci healthcheck || true
          echo "image built and healthcheck subcommand is wired"
